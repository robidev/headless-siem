# Extraction rules for common Linux log sources piped through journalctl.
#
# Usage:  journalctl | normalized --stdin --config config/normalized.toml
#
# Design: each source uses two passes.
#   Pass 1  — one [[extract.rule]] per source with multiple `pattern =` lines.
#             Named captures add fields; earlier captures win (no clobbering).
#             No `set` here — `set` applies whenever conditions match, so mixing
#             `set` with pass-1 patterns would assign event_type to every event
#             from that source.
#   Pass 2  — one [[extract.rule]] per event type.  The condition tests a short
#             discriminating field captured in pass 1, so only the matching
#             event type gets the `set`.  Rules run in order; later `set` calls
#             overwrite earlier ones, so source-specific rules can intentionally
#             override a generic assignment (see systemd session_start).

[listen]
udp_port = 514
tcp_port = 514

[storage]
data_dir = "data"

# Relabel kernel UFW lines as source "iptables" so sources.toml index_fields
# apply correctly.  The extract rules below still condition on app_name = "kernel"
# because override rules change the source label but not app_name.
[[overrides.rule]]
contains = "[UFW "
source = "iptables"

# pfSense filterlog: the message body is a positional CSV whose column positions
# shift between IPv4 and IPv6 and between protocols.  Trigger the dedicated
# filterlog Rust parser as a second pass on the message field.
[[overrides.rule]]
contains = " filterlog "
reparse = true
reparse_as = "filterlog"

# ─────────────────────────────────────────────────────────────────────────────
# sshd
#
# Patterns handled:
#   Failed/Accepted (password|publickey) for [invalid user] <user> from <ip> port <port>
#   pam_unix(sshd:session): session (opened|closed) for user <user>
#   Connection closed by [authenticating] user <user> <ip> port <port> [preauth]
#   Invalid user <user> from <ip> port <port>
#   Did not receive identification string from <ip> port <port>
#   Connection reset by <ip> port <port> [preauth]
#   Received disconnect from <ip> port <port>:<reason>
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "sshd"
from = "message"
# Auth: Failed/Accepted password|publickey for [invalid user] <user> from <ip>
pattern = "^(?P<auth_action>Failed|Accepted) (?P<auth_method>\w+) for (?:invalid user )?(?P<username>\S+) from (?P<src_ip>[\d.]+) port (?P<src_port>\d+)"
# PAM session open/close. Stop the username before the "(uid=NNNN)" suffix that
# the "opened" variant appends ("...for user alice(uid=1000) by (uid=0)").
pattern = "session (?P<session_action>opened|closed) for user (?P<username>[^\s(]+)"
# Preauth connection close with authenticating user
pattern = "Connection (?P<conn_action>closed) by (?:authenticating )?user (?P<username>\S+) (?P<src_ip>[\d.]+) port (?P<src_port>\d+)"
# Standalone invalid-user probe (anchored so it doesn't match "for invalid user" in auth lines)
pattern = "^(?P<sshd_invalid>Invalid user) (?P<username>\S+) from (?P<src_ip>[\d.]+) port (?P<src_port>\d+)"
# Network-level preauth events — capture src_ip and a tag for pass-2 dispatch
pattern = "(?P<sshd_event>Did not receive identification string) from (?P<src_ip>[\d.]+) port (?P<src_port>\d+)"
pattern = "(?P<sshd_event>Connection reset) by (?P<src_ip>[\d.]+) port (?P<src_port>\d+)"
pattern = "(?P<sshd_event>Received disconnect) from (?P<src_ip>[\d.]+) port (?P<src_port>\d+)"
pattern = "^(?P<auth_action>Timeout) before authentication for connection from (?P<src_ip>[\d.]+) to (?P<dst_ip>[\d.]+), pid = (?P<pid>[\d]+)"
# Public-key auth records the key type and fingerprint after "ssh2:"
pattern = "for (?P<username>\S+) from (?P<src_ip>[\d.]+) port (?P<src_port>\d+) ssh2: (?P<key_type>\S+) (?P<key_fingerprint>\S+)"
# Post-auth disconnect naming the user (distinct from the preauth "Received disconnect")
pattern = "^(?P<ssh_disconnected>Disconnected) from user (?P<username>\S+) (?P<src_ip>[\d.]+) port (?P<src_port>\d+)"

[[extract.rule]]
app_name = "sshd"
auth_action = "Timeout"
set = { event_type = "ssh_auth_timeout" }

[[extract.rule]]
app_name = "sshd"
auth_action = "Failed"
set = { event_type = "ssh_auth_failure" }

[[extract.rule]]
app_name = "sshd"
auth_action = "Accepted"
set = { event_type = "ssh_auth_success" }

[[extract.rule]]
app_name = "sshd"
session_action = "opened"
set = { event_type = "ssh_session_open" }

[[extract.rule]]
app_name = "sshd"
session_action = "closed"
set = { event_type = "ssh_session_close" }

[[extract.rule]]
app_name = "sshd"
conn_action = "closed"
set = { event_type = "ssh_conn_closed" }

[[extract.rule]]
app_name = "sshd"
sshd_invalid = "Invalid user"
set = { event_type = "ssh_invalid_user" }

[[extract.rule]]
app_name = "sshd"
sshd_event = "Did not receive identification string"
set = { event_type = "ssh_scanner" }

[[extract.rule]]
app_name = "sshd"
sshd_event = "Connection reset"
set = { event_type = "ssh_conn_reset" }

[[extract.rule]]
app_name = "sshd"
sshd_event = "Received disconnect"
set = { event_type = "ssh_disconnect" }

[[extract.rule]]
app_name = "sshd"
ssh_disconnected = "Disconnected"
set = { event_type = "ssh_disconnect" }

# ─────────────────────────────────────────────────────────────────────────────
# kernel / UFW iptables  (source relabeled to "iptables" by override rule above)
#
# Patterns handled:
#   [UFW BLOCK|ALLOW|AUDIT] IN=<if> ... SRC=<ip> DST=<ip> LEN=<n>
#   ... PROTO=<proto> SPT=<port> DPT=<port> TTL=<n> ...
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "kernel"
from = "message"
pattern = "\[UFW (?P<ufw_action>\w+)\]"
pattern = "SRC=(?P<src_ip>[\d.]+)"
pattern = "DST=(?P<dst_ip>[\d.]+)"
pattern = "SPT=(?P<src_port>\d+)"
pattern = "DPT=(?P<dst_port>\d+)"
pattern = "PROTO=(?P<protocol>\w+)"
pattern = "\bIN=(?P<in_iface>[\w.]+)"
pattern = "TTL=(?P<ttl>\d+)"
pattern = "LEN=(?P<pkt_len>\d+)"

[[extract.rule]]
app_name = "kernel"
ufw_action = "BLOCK"
set = { event_type = "firewall_block" }

[[extract.rule]]
app_name = "kernel"
ufw_action = "ALLOW"
set = { event_type = "firewall_allow" }

[[extract.rule]]
app_name = "kernel"
ufw_action = "AUDIT"
set = { event_type = "firewall_audit" }

# ─────────────────────────────────────────────────────────────────────────────
# sudo
#
# Patterns handled:
#   <user> : TTY=<tty> ; PWD=<dir> ; USER=<target> ; COMMAND=<cmd>
#   pam_unix(sudo:auth): authentication failure; ... user=<user>
#   pam_unix(sudo:session): session opened for user <target> by <user>(uid=N)
#   pam_unix(sudo:session): session closed for user <target>
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "sudo"
from = "message"
# Command execution — invoking user, TTY, working dir, target user, command
pattern = "^(?P<username>\S+)\s*:\s*TTY=(?P<tty>\S+)\s*;\s*PWD=(?P<pwd>\S+)\s*;\s*USER=(?P<target_user>\S+)\s*;\s*(?P<sudo_action>COMMAND)=(?P<command>.+)$"
# PAM auth failure: last `user=` in the line is the invoking user
pattern = "sudo:auth\).*authentication (?P<sudo_event>failure).*\buser=(?P<username>\S+)\s*$"
# PAM session open/close — target user (the one being switched to)
pattern = "sudo:session\).*session (?P<session_action>opened|closed) for user (?P<target_user>\S+)"
# Session open attribution — who invoked sudo (appears as "by user(uid=N)")
pattern = "session opened for user \S+ by (?P<username>\S+)\("

[[extract.rule]]
app_name = "sudo"
sudo_action = "COMMAND"
set = { event_type = "sudo_command" }

[[extract.rule]]
app_name = "sudo"
sudo_event = "failure"
set = { event_type = "sudo_auth_failure" }

[[extract.rule]]
app_name = "sudo"
session_action = "opened"
set = { event_type = "sudo_session_open" }

[[extract.rule]]
app_name = "sudo"
session_action = "closed"
set = { event_type = "sudo_session_close" }

# ─────────────────────────────────────────────────────────────────────────────
# systemd
#
# Patterns handled:
#   Started|Starting|Stopped|Stopping|Failed|Reloaded <unit>
#   Started Session <id> of user <user>.
#
# The session_start rule runs after unit_started and overwrites event_type for
# session events — that is intentional (set always wins, later rule wins).
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "systemd"
from = "message"
# Generic unit state — captures action word and unit name
pattern = "^(?P<action>Started|Starting|Stopped|Stopping|Failed|Reloaded|Reloading) (?P<unit>.+?)(?:\.\.\.|\.)?\s*$"
# Session fields — username and session ID (only present in session start lines)
# [^\s.]+ stops before the sentence-ending period in "Started Session N of user X."
pattern = "(?P<systemd_session>Session) (?P<session_id>\S+) of user (?P<username>[^\s.]+)"

[[extract.rule]]
app_name = "systemd"
action = "Started"
set = { event_type = "unit_started" }

[[extract.rule]]
app_name = "systemd"
action = "Starting"
set = { event_type = "unit_starting" }

[[extract.rule]]
app_name = "systemd"
action = "Stopped"
set = { event_type = "unit_stopped" }

[[extract.rule]]
app_name = "systemd"
action = "Stopping"
set = { event_type = "unit_stopping" }

[[extract.rule]]
app_name = "systemd"
action = "Failed"
set = { event_type = "unit_failed" }

# Must come after unit_started so `set` overwrites event_type for session lines
[[extract.rule]]
app_name = "systemd"
systemd_session = "Session"
set = { event_type = "session_start" }

# ─────────────────────────────────────────────────────────────────────────────
# filterlog  (pfSense firewall)
#
# The CSV payload is decoded by parsers/filterlog.rs (triggered via the
# override rule above).  That parser sets `action` to "BLOCK" or "ALLOW" and
# populates src_ip, dst_ip, src_port, dst_port, protocol, interface, direction.
# These two pass-2 rules assign the event_type from the already-set action.
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "filterlog"
action = "BLOCK"
set = { event_type = "firewall_block" }

[[extract.rule]]
app_name = "filterlog"
action = "ALLOW"
set = { event_type = "firewall_allow" }

# ─────────────────────────────────────────────────────────────────────────────
# openvpn  (pfSense OpenVPN)
#
# Patterns handled:
#   TLS Error: tls-crypt unwrapping failed from [AF_INET]<ip>:<port>
#   tls-crypt unwrap error: packet authentication failed
#   SIGUSR1[soft,ping-restart] received, process restarting
#   UDPv4 link remote: [AF_INET]<ip>:<port>
#   [UNDEF] Inactivity timeout (--ping-restart), restarting
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "openvpn"
from = "message"
# TLS failure with source IP — most events (probing / misconfigured client)
pattern = "^TLS Error: (?P<openvpn_tls>tls-crypt unwrapping failed) from \[AF_INET\](?P<src_ip>[\d.]+):(?P<src_port>\d+)"
# TLS auth failure without an IP (local unwrap error)
pattern = "^(?P<openvpn_tls>tls-crypt unwrap error): packet authentication failed"
# Process restart signal
pattern = "^(?P<openvpn_restart>SIGUSR1)\["
# Link established — extract remote endpoint
pattern = "link remote: \[AF_INET\](?P<src_ip>[\d.]+):(?P<src_port>\d+)"
pattern = "^(?P<openvpn_link>UDPv4 link remote|TCPv4 link remote|UDPv6 link remote)"
# Inactivity timeout
pattern = "(?P<openvpn_timeout>Inactivity timeout)"

[[extract.rule]]
app_name = "openvpn"
openvpn_tls = "tls-crypt unwrapping failed"
set = { event_type = "vpn_tls_error" }

[[extract.rule]]
app_name = "openvpn"
openvpn_tls = "tls-crypt unwrap error"
set = { event_type = "vpn_auth_failure" }

[[extract.rule]]
app_name = "openvpn"
openvpn_restart = "SIGUSR1"
set = { event_type = "vpn_restart" }

[[extract.rule]]
app_name = "openvpn"
openvpn_link = "UDPv4 link remote"
set = { event_type = "vpn_link_up" }

[[extract.rule]]
app_name = "openvpn"
openvpn_link = "TCPv4 link remote"
set = { event_type = "vpn_link_up" }

[[extract.rule]]
app_name = "openvpn"
openvpn_timeout = "Inactivity timeout"
set = { event_type = "vpn_timeout" }

# ─────────────────────────────────────────────────────────────────────────────
# php-fpm  (pfSense web UI admin audit log)
#
# Patterns handled:
#   /<page>: Configuration Change: <user>@<ip> (<auth>): <description>
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "php-fpm"
from = "message"
# Admin configuration change — extract page path, acting user, source IP
pattern = "^(?P<pfsense_page>/[^:]+): (?P<pfsense_change>Configuration Change): (?P<admin_user>[^@]+)@(?P<src_ip>[\d.]+)"

[[extract.rule]]
app_name = "php-fpm"
pfsense_change = "Configuration Change"
set = { event_type = "pfsense_config_change" }

# ─────────────────────────────────────────────────────────────────────────────
# haproxy  (pfSense TLS reverse proxy)
#
# This deployment fronts internal services with a client-certificate-verifying
# HAProxy. Most lines are connection/SSL events rather than HTTP access logs:
#   <client_ip>:<port> [<ts>] <frontend>/<backend>:<bport>: SSL handshake failure[ (<detail>)]
# The optional HTTP-access pattern below captures method/uri/status when HAProxy
# is configured with an HTTP log format.
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "haproxy"
from = "message"
# Connection/SSL log line — client address, frontend and backend target
pattern = "^(?P<src_ip>[\d.]+):(?P<src_port>\d+) \[[^\]]+\] (?P<frontend>[^/ ]+)/(?P<backend>[^: ]+)"
# Discriminator: TLS handshake rejected (no/invalid client cert, cipher, proto)
pattern = "(?P<haproxy_tls>SSL handshake failure)"
# Best-effort HTTP access fields, when present in the request capture
pattern = "\"(?P<http_method>[A-Z]+) (?P<http_uri>\S+) HTTP/"

[[extract.rule]]
app_name = "haproxy"
haproxy_tls = "SSL handshake failure"
set = { event_type = "tls_handshake_failure", severity = "warning" }

# ─────────────────────────────────────────────────────────────────────────────
# CRON  (cron job execution)
#
# Patterns handled:
#   (<user>) CMD (<command>)
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "cron"
from = "message"
pattern = "^\((?P<cron_user>[^)]+)\) (?P<cron_action>CMD) \((?P<command>.+)\)\s*$"

[[extract.rule]]
app_name = "cron"
cron_action = "CMD"
set = { event_type = "cron_exec" }

# ─────────────────────────────────────────────────────────────────────────────
# systemd-logind  (login session tracking)
#
# Patterns handled:
#   New session '<id>' of user '<user>' with class '<class>' and type '<type>'.
#   Session <id> logged out. ...
#   Removed session <id>.
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "systemd-logind"
from = "message"
pattern = "^New session '?(?P<session_id>[^' ]+)'? of user '?(?P<username>[^' ]+?)'? with class '?(?P<session_class>[^' ]+?)'? and type '?(?P<session_type>[^' .]+)"
pattern = "^(?P<logind_new>New session)"
pattern = "^Session (?P<session_id>\S+?)\.? (?P<logind_logout>logged out)"
pattern = "^(?P<logind_removed>Removed session) (?P<session_id>[^. ]+)"

[[extract.rule]]
app_name = "systemd-logind"
logind_new = "New session"
set = { event_type = "session_new" }

[[extract.rule]]
app_name = "systemd-logind"
logind_logout = "logged out"
set = { event_type = "session_logout" }

[[extract.rule]]
app_name = "systemd-logind"
logind_removed = "Removed session"
set = { event_type = "session_removed" }

# ─────────────────────────────────────────────────────────────────────────────
# unix_chkpwd  (PAM helper — local password verification)
#
# Emitted by su/login/sudo/screensaver when a local password check fails:
#   password check failed for user (<user>)
# ─────────────────────────────────────────────────────────────────────────────

[[extract.rule]]
app_name = "unix_chkpwd"
from = "message"
pattern = "password check (?P<chkpwd_result>failed) for user \((?P<username>[^)]+)\)"

[[extract.rule]]
app_name = "unix_chkpwd"
chkpwd_result = "failed"
set = { event_type = "local_auth_failure", severity = "warning" }
