# rsyslog configuration for Headless SIEM
# Drop this in /etc/rsyslog.d/50-headless-siem.conf
#
# Pipeline:  rsyslog → normalized-in.pipe → normalized → normalized-out.pipe → ruled
#
# normalized reads from the named pipe in --stdin mode.  rsyslog writes to it
# using omfile (appends to the FIFO).  No omprog needed — normalized runs as
# its own systemd service (headless-siem-normalized.service).

# --- Disk-assisted queue (durability before processing) ---
$MainMsgQueueType LinkedList
$MainMsgQueueFileName /var/spool/rsyslog/siem-queue
$MainMsgQueueMaxDiskSpace 1g
$MainMsgQueueSaveOnShutdown on
$MainMsgQueueTimeoutEnqueue 0

# --- Template: JSON envelope understood by normalized's envelope.rs ---
template(name="siem_json" type="list") {
    constant(value="{")
    constant(value="\"_source_type\":\"")  property(name="$programname")
    constant(value="\",\"_host\":\"")      property(name="hostname")
    constant(value="\",\"_facility\":\"")  property(name="syslogfacility-text")
    constant(value="\",\"_severity\":\"")  property(name="syslogseverity-text")
    constant(value="\",\"_timestamp\":\"") property(name="timereported" dateFormat="rfc3339")
    constant(value="\",\"_raw\":\"")       property(name="msg" format="json")
    constant(value="\"}\n")
}

# --- Forward all logs to normalized via the named pipe ---
*.* action(type="omfile"
           file="/run/headless-siem/normalized-in.pipe"
           template="siem_json"
           flushOnTXEnd="on")
