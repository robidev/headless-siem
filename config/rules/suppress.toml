# note = "Known scanner range, seen 2026-07-03 shakedown + confirmed live 07-04..07-07"

[[suppress]]
rule_id = "1007-haproxy-tls-probe"
condition = 'cidr_match(src_ip, "93.152.208.0/24")'
expires = "2026-10-05"
note = "Scanner range crossed runbooks/haproxy.md's 3+-separate-days threshold 2026-07-11 (Jul 5, Jul 7, Jul 11 — tuner-dev/20260711T143406.626); all tls_handshake_failure against proxmox_reverse_proxy, no successful handshake. Same expires horizon as the sibling ranges seeded from the same table."

[[suppress]]
rule_id = "1007-haproxy-tls-probe"
condition = 'cidr_match(src_ip, "199.45.154.0/24")'
expires = "2026-10-05"
note = "Scanner range crossed runbooks/haproxy.md's 3+-separate-days threshold 2026-07-11 (Jul 1, Jul 5, Jul 11 — tuner-dev/20260711T185836.844, operator-filed); single src_ip 199.45.154.142, all tls_handshake_failure against proxmox_reverse_proxy, no successful handshake. Same expires horizon as the sibling ranges seeded from the same table."

[[suppress]]
rule_id = "1007-haproxy-tls-probe"
condition = 'src_ip == "217.103.119.155"'
expires = "2026-09-10"
note = "Single src_ip crossed runbooks/haproxy.md's 3+-separate-days threshold (2026-07-10T21:21:03Z/21:25:03Z, 2026-07-11T23:19:32Z/23:36:55Z — tuner-dev/20260712T001855.152); all tls_handshake_failure against proxmox_reverse_proxy, no successful handshake. Not in the documented scanner-range table. Scoped to an exact src_ip match, not cidr_match on 217.103.119.0/24, because that /24 also contains this homelab's own WAN IP (217.103.119.155, runbooks/environment.md) — a range suppression here would silently swallow the SIEM's own WAN-sourced haproxy alerts too. Shorter expires than the sibling range entries given the single-IP / adjacent-to-own-WAN uncertainty — worth re-confirming sooner rather than assuming it's a stable scanner range."

[[suppress]]
rule_id = "1007-haproxy-tls-probe"
condition = 'src_ip == "192.168.178.12"'
note = "Not a probe -- this is pfSense's own siem_watchdog.php cron (every 5 min, operator-added 2026-07-17) deliberately failing a TLS handshake against proxmox_reverse_proxy with no client cert, to prove HAProxy's own UDP-log path is still alive (runbooks/haproxy.md's 'Mitigation: self-generated heartbeat' section — mitigates the silent log-emission stall known issue above). src_ip is always this box's own address, which no real external prober can ever present, so this is a safe permanent match, not a temporary scanner-range tolerance. No expires deliberately: this suppression should live as long as the heartbeat probe does, not lapse and start generating a false noise ticket every 5 minutes. Remove together with the probe in /root/siem_watchdog.php if the heartbeat mechanism is ever retired, not independently."

# Candidates from llm-based-soc/runbooks/filterlog.md (updated 2026-07-10) —
# 1009-firewall-port-scan fires on every filterlog block; the overwhelming
# majority of volume is routine multicast/broadcast background noise
# (IGMP/mDNS/SSDP/MLDv2/NDP), not scan activity. filterlog forwarding was
# silent 2026-07-04..07-09 (llm-based-soc's archived plan issue #44); this is the first
# full window of confirmed-clean post-fix production data
# (2026-07-09T21:11:19Z-2026-07-10T05:48Z, 454 alerts, all to the
# destinations below). Real port scans target unicast hosts, never these
# reserved multicast/broadcast addresses, so this can't suppress a real
# scan finding.

[[suppress]]
rule_id = "1009-firewall-port-scan"
condition = 'cidr_match(dst_ip, "224.0.0.0/4") OR dst_ip == "255.255.255.255"'
expires = "2026-09-08"
note = "IPv4 multicast/broadcast background noise (IGMP/mDNS/SSDP) — runbooks/filterlog.md"

[[suppress]]
rule_id = "1009-firewall-port-scan"
condition = 'dst_ip == "ff02::2" OR dst_ip == "ff02::c" OR dst_ip == "ff02::16" OR dst_ip == "ff02::fb"'
expires = "2026-09-08"
note = "IPv6 link-local multicast background noise (all-routers/SSDP/MLDv2/mDNS) — runbooks/filterlog.md. Per-host solicited-node multicast (ff02::1:ff00:0/104, IPv6 NDP/DAD) isn't covered: cidr_match() is IPv4-only (src/ruled/src/suppress.rs), so ff02::/16 can't be expressed as one CIDR here."

# Allowlist for the new 1012-haproxy-connect-volume signal rule
# (correlations.toml's 'haproxy-connect-flood', min_count=100/1h) —
# tuner-dev/20260719T054919.000. Without this, 194.53.160.0/22's ordinary
# admin-session volume (5,000+ connects/hour on both a confirmed-benign day
# and the day that originally looked like a flood — no threshold separates
# the two, per that ticket's 2026-07-19T15:00:43Z comment) would trip the
# correlation constantly. This suppresses 1012 alerts only — 1007's TLS-probe
# suppressions above are untouched, so a real rejected handshake from these
# ranges still alerts normally.

[[suppress]]
rule_id = "1012-haproxy-connect-volume"
condition = 'cidr_match(src_ip, "194.53.160.0/22")'
expires = "2026-10-19"
note = "Alliander N.V. (RIPE-registered) operator office/admin egress range, runbooks/haproxy.md 'Known-benign: registered office/admin access'. Re-verify RDAP registration is unchanged before renewing past expires."

[[suppress]]
rule_id = "1012-haproxy-connect-volume"
condition = 'src_ip == "217.103.119.155"'
expires = "2026-10-19"
note = "Already-suppressed 1007-haproxy-tls-probe scanner IP (see that entry above for the exact-match-not-range rationale — this /24 also contains this homelab's own WAN IP). Allowlisted here too so the same known source doesn't double-ticket via the new connect-volume correlation as well as 1007."
