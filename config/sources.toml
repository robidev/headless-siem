# Index field definitions — consumed by indexd and siemctl.
# Each [source.*] entry lists which fields to extract from JSONL records
# and store in the per-bucket SQLite index. The union of all index_fields
# across all sources determines the SQLite schema.
#
# Source labels come from the normalized binary (app_name, _source_type,
# override rules, etc.) — not from this file.
#
# ── Always-indexed fields ─────────────────────────────────────────────────────
#
# These are present in every bucket without any entry here.
#
# Syslog envelope fields — from the transport layer, available on every event:
#   source_addr   Sender IP address (UDP source), or "stdin" for piped input.
#                 Use to identify which host sent the log when multiple sources
#                 forward to the same collector.
#   hostname      Hostname from the syslog header.
#   app_name      Process name from the syslog header, BEFORE any override rule
#                 rewrites _source_type. E.g. when kernel logs are relabelled to
#                 "iptables", app_name is still "kernel". Useful for catching
#                 sources that haven't been assigned a specific source label yet.
#
# Core normalization fields — produced by the pipeline for every event:
#   timestamp     Event timestamp (falls back to receive time if not in the log).
#   _source_type  Derived source label (app_name + override rules).
#   severity      Syslog severity level.
#
# Internal index pointers (not user-searchable):
#   byte_offset, raw_file   Back-reference to the raw JSONL line for --full/-F
#                           lookups and raw_contains() UDF.
#
# ── Per-source fields ─────────────────────────────────────────────────────────
#
# Declare application-specific fields below. Only list fields not already in
# the always-indexed set above.

[source.filterlog]
index_fields = ["src_ip", "dst_ip", "dst_port", "action", "protocol", "interface", "direction", "event_type"]

[source.openvpn]
index_fields = ["src_ip", "src_port", "event_type"]

[source.php-fpm]
index_fields = ["admin_user", "src_ip", "event_type", "pfsense_page"]

[source.sshd]
index_fields = ["src_ip", "src_port", "dst_ip", "username", "event_type", "auth_method", "auth_action"]

[source.sudo]
index_fields = ["username", "event_type"]

[source.iptables]
index_fields = ["src_ip", "dst_ip", "dst_port", "event_type"]

[source.systemd]
index_fields = ["event_type", "unit"]

[source.router]
index_fields = ["src_ip", "dst_ip", "dst_port", "event_type"]

[source.unifi]
index_fields = ["src_ip", "dst_ip", "event_type"]

[source.dnsmasq]
index_fields = ["src_ip", "query", "event_type"]

[source.haproxy]
index_fields = ["src_ip", "src_port", "frontend", "backend", "event_type", "http_method", "http_uri"]

[source.CRON]
index_fields = ["cron_user", "command", "event_type"]

[source.systemd-logind]
index_fields = ["username", "session_id", "session_class", "session_type", "event_type"]

[source.unix_chkpwd]
index_fields = ["username", "event_type"]

# Catch-all: fields indexed when the source label doesn't match any entry above.
[source.default]
index_fields = ["src_ip", "dst_ip", "event_type"]
